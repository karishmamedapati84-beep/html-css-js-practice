<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <fieldset>
            <legend>Event Registration Form</legend>
            <label for="">Full Name:</label>
            <input type="text" placeholder="M.karishma" required><br><br>
            <label for="">Email Address:</label>
             <input type="email" name="" id=""  value="" placeholder="karishmamedapati84@gmail.com" required><br><br>
             <label for="">Phone Number:</label>
             <input type="tel" name="phone" id="phone"  pattern="[0-9]{10}" placeholder="10 digit Number" ><br><br>
             <label for="">Gender:</label><br><br>
             <input type="radio" name="gender" id="male" value="male" required>
             <label for="male">Male</label><br>
             <input type="radio" name="gender" id="female" value="female">
             <label for="female">Female</label><br>
             <input type="radio" name="gender" id="other" value="other">
             <label for="other">Other</label><br><br>
             <label for="">Ticket Type:</label>
             <select name="" id="">
                <option value="Regular">Regular</option>
                <option value="VIP">VIP</option>
                <option value="Student">Student</option>
             </select><br><br>
             <label for="">Numeber of tickets:</label>
             <input type="number" name="tickets" id="tickets" min="1" max="5"><br><br>
             <label for="">Date of Attendance:</label>
             <input type="Date" name="date" id="date"><br><br>
             <label for="">Preffered Session Time :</label>
             <input type="datetime-local" name="session" id="session"><br><br>
             <label for="">Upload Resume:</label>
             <input type="file" name="Resume" id="Resume"><br><br>
             <input type="checkbox" name="subscribe" id="subscribe">
             <label for="">Subscribe to NewsLetter</label><br><br>
             <label for="">Additional Notes:</label>
             <textarea id="Additional Notes" rows="5" cols="100" placeholder="Additional Notes"></textarea><br><br>
             <input type="submit"> 
             <input type="Reset">
        </fieldset>
        </form>
</body>
</html>
