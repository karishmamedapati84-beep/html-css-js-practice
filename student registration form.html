<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <fieldset>
            <legend>Student Registration Form</legend>
    <label for="">Full Name:</label>
    <input type="text" placeholder="M.karishma" required><br><br>
    <label for="">Email Address:</label>
    <input type="email" name="" id="" value="" placeholder="karishmamedapati84@gmail.com" required><br><br>
     <label for="">Password :</label>
    <input type="Password" name="" id=""  required minlength="6" placeholder="Minimum 6 characters"><br><br>
     <label for="">Gender:</label><br><br>
    <input type="radio" name="gender" id="male" value="male" required>
     <label for="male">Male</label><br>
    <input type="radio" name="gender" id="female" value="female">
    <label for="female">Female</label><br>
    <input type="radio" name="gender" id="other" value="other">
    <label for="other">Other</label><br><br>
    <label for="">Hobbies:</label><br>
    <input type="checkbox" name="" id="" value="Reading">Reading<br>
    <input type="checkbox" name="" id="" value="sports">Sports<br>
    <input type="checkbox" name="" id="" value="Music">Music<br>
    <input type="checkbox" name="" id="" value="Others">Others<br><br>
    <label for="">Date of Birth:</label>
    <input type="date" name="DOB" id="DOB" value="DOB"><br><br>
    <label for="">Phone Number:</label>
    <input type="tel" name="phone" id="phone"  pattern="[0-9]{10}" placeholder="10 digit Number" ><br><br>
    <label for="">Upload Profile Picture</label>
    <input type="file" id="profile" name="profile"><br><br>
    <lable for=""> Course:</lable>
    <select name="" id="">
        <option value="B.Tech">B.Tech</option>
        <option value="B.com">B.com</option>
        <option value="B.Sc">B.Sc</option>
        <option value="BBA">BBA</option>
        <option value="BA">BA</option>
    </select><br><br>
    <label for="">Number of Subjects:</label>
    <input type="number" name="Subjects" id="Subjects" min="1" max="8"><br><br>
    <label for="">Additional Comments:</label><br>
    <textarea id="Additional Comments" rows="4" cols="50" placeholder="Additional Comments"></textarea><br><br>
    <input type="checkbox" name="terms" id="terms" >I Accept terms and conditions<br><br>
    <input type="submit">
    <input type="reset">
</fieldset>
</form>
</body>
</html>
